# Default configuration for ViT Chest X-Ray training

# Model configuration
model:
  name: "vit_base_patch16_224"
  pretrained: true
  num_classes: 14
  freeze_blocks: 8  # Freeze first 8 blocks, fine-tune blocks 8-11
  dropout: 0.3
  attention_extraction: true

# Data configuration
data:
  nih_path: "data/nih/"
  chexpert_path: "data/chexpert/"
  image_size: 224
  batch_size: 32
  num_workers: 4
  pin_memory: true
  
  # Augmentations
  augmentations:
    random_rotation: 10  # degrees
    random_zoom: 0.1
    horizontal_flip: 0.5
    brightness: 0.2
    contrast: 0.2

# Training configuration
training:
  epochs: 10
  lr_backbone: 1.0e-5
  lr_head: 1.0e-4
  weight_decay: 0.01
  scheduler: "cosine"  # cosine, step, plateau
  scheduler_params:
    T_max: 10
    eta_min: 1.0e-7
  early_stopping_patience: 3
  gradient_clip: 1.0
  mixed_precision: true
  accumulate_grad_batches: 1

# Loss configuration
loss:
  name: "cac"  # bce, weighted_bce, cac
  cac_weight: 0.5
  pos_weight: true
  label_smoothing: 0.0

# Evaluation configuration
evaluation:
  metrics: ["auc", "sensitivity", "specificity"]
  cross_hospital: true
  per_disease_analysis: true
  threshold_optimization: "youden"

# Visualization
visualization:
  save_attention_maps: true
  save_confusion_matrix: true
  save_roc_curves: true
  log_interval: 10

# Logging
logging:
  log_dir: "logs/"
  checkpoint_dir: "models/checkpoints/"
  save_best: true
  save_last: true
  tensorboard: true
  wandb:
    project: "vit-chest-xray"
    entity: null
    tags: ["cac", "nih", "chexpert"]

# System
system:
  device: "cuda"  # cuda, cpu, mps
  seed: 42
  deterministic: false
  benchmark: true